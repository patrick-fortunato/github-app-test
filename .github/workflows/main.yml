name: TestBypass
on:
  workflow_dispatch:
#   push:
#     branches: [ "master" ]
jobs:
  push-to-protected:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Using the PAT here configures the local git credentials to use it for all subsequent pushes
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Make changes and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Automated update" >> update.log
          git add update.log
          git commit -m "chore: automated update [skip ci]"
          git push origin main
